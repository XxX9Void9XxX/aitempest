<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TempestAI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b10;
  color: white;
  height: 100vh;
  overflow: hidden;
}

.app {
  display: flex;
  height: 100vh;
}

/* THIN SIDEBAR */
.sidebar {
  width: 60px;
  background: #0f0f14;
  border-right: 1px solid #222;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.logo {
  font-size: 10px;
  padding: 10px;
  color: #7a3cff;
}

.chatlist {
  flex: 1;
  width: 100%;
  overflow-y: auto;
}

.chatitem {
  font-size: 10px;
  margin: 5px;
  padding: 6px;
  background: #1a1a1a;
  border-radius: 6px;
  cursor: pointer;
  text-align: center;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.topbar {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  border-bottom: 1px solid #222;
}

select {
  background: #111;
  color: white;
  border: 1px solid #333;
}

/* CHAT */
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
}

.msg {
  margin: 10px 0;
  display: flex;
}

.user { justify-content: flex-end; }
.ai { justify-content: flex-start; }

.bubble {
  max-width: 70%;
  padding: 10px;
  border-radius: 10px;
  white-space: pre-wrap;
}

.user .bubble { background: #1f6fff; }
.ai .bubble { background: #1c1c1c; }

/* INPUT */
.input {
  display: flex;
  padding: 10px;
  border-top: 1px solid #222;
}

textarea {
  flex: 1;
  background: #111;
  border: none;
  color: white;
  padding: 10px;
  resize: none;
}

button {
  width: 80px;
  margin-left: 10px;
  background: #7a3cff;
  border: none;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="app">

  <div class="sidebar">
    <div class="logo">AI</div>
    <div class="chatlist" id="chatlist"></div>
  </div>

  <div class="main">

    <div class="topbar">
      <div>TempestAI</div>

      <select id="model">
        <option value="llama-3.3-70b-versatile">Llama 3.3</option>
        <option value="llama-3.1-8b-instant">Llama 3.1</option>
        <option value="mixtral-8x7b">Mixtral</option>
      </select>

      <button onclick="stopAI()">Stop</button>
    </div>

    <div class="chat" id="chat"></div>

    <div class="input">
      <textarea id="input"></textarea>
      <button onclick="send()">Send</button>
    </div>

  </div>

</div>

<script>
let chatDiv = document.getElementById("chat");
let input = document.getElementById("input");

let chatId = localStorage.getItem("chatId");
if (!chatId) {
  chatId = crypto.randomUUID();
  localStorage.setItem("chatId", chatId);
}

let controller = null;

function add(role, text) {
  const wrap = document.createElement("div");
  wrap.className = "msg " + role;

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;

  wrap.appendChild(bubble);
  chatDiv.appendChild(wrap);

  chatDiv.scrollTop = chatDiv.scrollHeight;

  return bubble;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  input.value = "";

  add("user", text);

  const ai = add("ai", "");

  controller = new AbortController();

  const res = await fetch("/api/chat", {
    method: "POST",
    signal: controller.signal,
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      message: text,
      model: document.getElementById("model").value,
      chatId
    })
  });

  const reader = res.body.getReader();
  const decoder = new TextDecoder();

  let full = "";

  try {
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;

      full += decoder.decode(value);
      ai.textContent = full;
    }
  } catch (e) {}
}

function stopAI() {
  if (controller) controller.abort();
}
</script>

</body>
</html>
