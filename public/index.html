<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TempestAI</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0b0b0f;
  color: white;
  font-family: Arial, sans-serif;
  height: 100vh;
  overflow: hidden;
}

.app {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: #111;
  border-right: 1px solid #222;
  display: flex;
  flex-direction: column;
}

.logo {
  padding: 20px;
  font-size: 20px;
  font-weight: bold;
  color: #7a3cff;
}

.newchat {
  margin: 10px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #7a3cff;
  color: white;
  cursor: pointer;
}

.chatlist {
  flex: 1;
  overflow-y: auto;
}

.chatitem {
  padding: 10px;
  margin: 5px 10px;
  background: #1a1a1a;
  border-radius: 8px;
  cursor: pointer;
}

.chatitem.active {
  background: #2a2a2a;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* CHAT */
.chat {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

.msg {
  margin: 10px 0;
  display: flex;
}

.user {
  justify-content: flex-end;
}

.ai {
  justify-content: flex-start;
}

.bubble {
  max-width: 70%;
  padding: 12px;
  border-radius: 10px;
  white-space: pre-wrap;
}

.user .bubble {
  background: #1f6fff;
}

.ai .bubble {
  background: #1c1c1c;
}

/* CODE BLOCK */
.code {
  background: #0a0a0a;
  border: 1px solid #333;
  border-radius: 10px;
  margin-top: 8px;
  overflow: hidden;
}

.codetop {
  display: flex;
  justify-content: space-between;
  padding: 6px 10px;
  background: #151515;
  font-size: 12px;
}

.copy {
  cursor: pointer;
  color: #7a3cff;
}

/* INPUT */
.inputbar {
  display: flex;
  padding: 10px;
  border-top: 1px solid #222;
}

textarea {
  flex: 1;
  resize: none;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #111;
  color: white;
}

button.send {
  margin-left: 10px;
  width: 80px;
  background: #7a3cff;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="app">

  <div class="sidebar">
    <div class="logo">TempestAI</div>
    <button class="newchat" onclick="newChat()">+ New Chat</button>
    <div class="chatlist" id="chatlist"></div>
  </div>

  <div class="main">

    <div class="chat" id="chat"></div>

    <div class="inputbar">
      <textarea id="input" rows="2"></textarea>
      <button class="send" onclick="send()">Send</button>
    </div>

  </div>

</div>

<script>
let chats = JSON.parse(localStorage.getItem("chats") || "[]");
let current = localStorage.getItem("current") || null;

if (!chats.length) {
  createChat();
}

renderChats();
loadChat();

function createChat() {
  const id = Date.now().toString();
  chats.unshift({ id, messages: [], name: "New Chat" });
  current = id;
  save();
}

function newChat() {
  createChat();
  renderChats();
  loadChat();
}

function save() {
  localStorage.setItem("chats", JSON.stringify(chats));
  localStorage.setItem("current", current);
}

function getChat() {
  return chats.find(c => c.id === current);
}

function renderChats() {
  const list = document.getElementById("chatlist");
  list.innerHTML = "";

  chats.forEach(c => {
    const div = document.createElement("div");
    div.className = "chatitem" + (c.id === current ? " active" : "");
    div.textContent = c.name;
    div.onclick = () => {
      current = c.id;
      save();
      renderChats();
      loadChat();
    };
    list.appendChild(div);
  });
}

function loadChat() {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  const c = getChat();
  if (!c) return;

  c.messages.forEach(m => addMsg(m.role, m.text));
}

function addMsg(role, text) {
  const chat = document.getElementById("chat");

  const wrap = document.createElement("div");
  wrap.className = "msg " + role;

  const bubble = document.createElement("div");
  bubble.className = "bubble";

  if (role === "ai") {
    bubble.innerHTML = format(text);
  } else {
    bubble.textContent = text;
  }

  wrap.appendChild(bubble);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function format(text) {
  return text.replace(/```(\\w+)?\\n([\\s\\S]*?)```/g,
    (m, lang, code) => {
      const safe = code
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");

      return `
<div class="code">
  <div class="codetop">
    <span>${lang || "code"}</span>
    <span class="copy" onclick="copy(this)">Copy</span>
  </div>
  <pre><code>${safe}</code></pre>
</div>`;
    });
}

function copy(el) {
  const code = el.parentElement.nextElementSibling.innerText;
  navigator.clipboard.writeText(code);
  el.textContent = "Copied";
  setTimeout(() => el.textContent = "Copy", 1000);
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  input.value = "";

  addMsg("user", text);

  const c = getChat();
  c.messages.push({ role: "user", text });

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();

  addMsg("ai", data.reply);

  c.messages.push({ role: "ai", text: data.reply });

  save();
}
</script>

</body>
</html>
