<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>TempestAI</title>

<style>
body {
  margin: 0;
  background: #0b0b0b;
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

.chat-container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 1000px;
  margin: auto;
  padding: 20px;
  box-sizing: border-box;
}

h1 {
  margin: 0 0 15px;
  color: #7a3cff;
  text-shadow: 0 0 10px #7a3cff;
}

#chat {
  flex: 1;
  overflow-y: auto;
  background: #111;
  border: 1px solid #222;
  border-radius: 12px;
  padding: 15px;
  box-shadow:
    0 0 15px rgba(122, 60, 255, 0.15),
    inset 0 0 10px rgba(122, 60, 255, 0.05);
}

.message {
  margin-bottom: 12px;
  padding: 12px;
  border-radius: 12px;
  max-width: 80%;
  white-space: pre-wrap;
  word-wrap: break-word;
  animation: fadeIn 0.2s ease;
}

.user {
  background: #1f6fff;
  margin-left: auto;
}

.ai {
  background: #1d1d1d;
  border: 1px solid #333;
}

.input-area {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid #333;
  background: #111;
  color: white;
  outline: none;
  font-size: 16px;
}

input:focus {
  border-color: #7a3cff;
  box-shadow: 0 0 10px rgba(122, 60, 255, 0.3);
}

button {
  padding: 14px 22px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #7a3cff, #1f6fff);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(122, 60, 255, 0.5);
}

::-webkit-scrollbar {
  width: 8px;
}

::-webkit-scrollbar-thumb {
  background: #333;
  border-radius: 10px;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(6px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<div class="chat-container">
  <h1>TempestAI</h1>

  <div id="chat"></div>

  <div class="input-area">
    <input
      type="text"
      id="message"
      placeholder="Type a message..."
      autocomplete="off"
    />

    <button onclick="sendMessage()">
      Send
    </button>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("message");

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    sendMessage();
  }
});

async function sendMessage() {
  const message = input.value.trim();

  if (!message) return;

  addMessage(message, "user");

  input.value = "";

  const loading = addMessage("Thinking...", "ai");

  try {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message
      })
    });

    const data = await response.json();

    loading.remove();

    addMessage(data.reply || "No response.", "ai");

  } catch (err) {
    loading.remove();

    addMessage("Error connecting to server.", "ai");

    console.error(err);
  }
}

function addMessage(text, type) {
  const div = document.createElement("div");

  div.className = `message ${type}`;

  div.textContent = text;

  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;

  return div;
}
</script>

</body>
</html>
